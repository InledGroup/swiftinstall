app-id: es.inled.AppInstall
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: appinstall
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=system-bus
  - --socket=session-bus
  - --device=dri
  - --filesystem=host
  - --filesystem=host-etc
  - --filesystem=host-os
  - --filesystem=/tmp
  - --filesystem=/var/tmp
  - --filesystem=/opt
  - --filesystem=/var/lib
  - --filesystem=/var/cache
  - --filesystem=/var/log
  - --filesystem=xdg-cache
  - --filesystem=xdg-data
  - --filesystem=xdg-config
  - --filesystem=xdg-run/gvfsd
  - --filesystem=/run/user
  - --filesystem=/media
  - --filesystem=/mnt

  - --talk-name=org.freedesktop.FileManager1
  - --talk-name=org.freedesktop.DBus
  - --talk-name=org.freedesktop.PackageKit
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=org.freedesktop.PolicyKit1
  - --talk-name=org.freedesktop.systemd1
  - --talk-name=org.gtk.vfs.*
  - --talk-name=com.ubuntu.SoftwareProperties
  - --talk-name=org.debian.apt
  - --system-talk-name=org.freedesktop.PackageKit
  - --system-talk-name=org.freedesktop.PolicyKit1
  - --system-talk-name=org.freedesktop.systemd1
  - --system-talk-name=org.freedesktop.UDisks2
  - --system-talk-name=org.debian.apt
  - --env=PATH=/app/bin:/usr/bin:/bin:/sbin:/usr/sbin:/usr/local/bin
  - --env=PYTHONPATH=/app/lib/python3.11/site-packages
  - --env=SUDO_ASKPASS=/app/bin/pkexec
  - --allow=devel
  - --allow=multiarch
  - --unset-env=LD_PRELOAD

modules:
  - name: system-tools
    buildsystem: simple
    build-commands:
      - mkdir -p /app/bin
      - |
        cat > /app/bin/pkexec << 'EOF'
        #!/bin/bash
        exec flatpak-spawn --host pkexec "$@"
        EOF
      - chmod +x /app/bin/pkexec
      - |
        cat > /app/bin/apt << 'EOF'
        #!/bin/bash
        exec flatpak-spawn --host apt "$@"
        EOF
      - chmod +x /app/bin/apt
      - |
        cat > /app/bin/dpkg << 'EOF'
        #!/bin/bash
        exec flatpak-spawn --host dpkg "$@"
        EOF
      - chmod +x /app/bin/dpkg
      - |
        cat > /app/bin/rpm << 'EOF'
        #!/bin/bash
        exec flatpak-spawn --host rpm "$@"
        EOF
      - chmod +x /app/bin/rpm
      - |
        cat > /app/bin/systemctl << 'EOF'
        #!/bin/bash
        exec flatpak-spawn --host systemctl "$@"
        EOF
      - chmod +x /app/bin/systemctl
      - |
        cat > /app/bin/clamscan << 'EOF'
        #!/bin/bash
        exec flatpak-spawn --host clamscan "$@"
        EOF
      - chmod +x /app/bin/clamscan
      - |
        cat > /app/bin/freshclam << 'EOF'
        #!/bin/bash
        exec flatpak-spawn --host freshclam "$@"
        EOF
      - chmod +x /app/bin/freshclam
    sources: []

  - name: python3-dependencies
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=${FLATPAK_DEST} requests packaging
    build-options:
      build-args:
        - --share=network
    sources: []

  - name: appinstall
    buildsystem: simple
    build-commands:
      - install -Dm755 start.py /app/share/appinstall/start.py
      - install -Dm644 styles.css /app/share/appinstall/styles.css
      - install -Dm644 appimage.png /app/share/appinstall/appimage.png
      - install -Dm644 locale/en/LC_MESSAGES/appinstall.mo /app/share/locale/en/LC_MESSAGES/appinstall.mo
      - install -Dm644 es.inled.AppInstall.metainfo.xml /app/share/metainfo/es.inled.AppInstall.metainfo.xml
      - install -Dm644 appinstall/usr/share/applications/es.inled.AppInstall.desktop /app/share/applications/es.inled.AppInstall.desktop
      - install -Dm644 appinstall/usr/share/pixmaps/es.inled.AppInstall.png /app/share/icons/hicolor/256x256/apps/es.inled.AppInstall.png
      - mkdir -p /app/bin
      - |
        cat > /app/bin/appinstall << 'EOF'
        #!/bin/bash
        exec python3 /app/share/appinstall/start.py "$@"
        EOF
      - chmod +x /app/bin/appinstall
    sources:
      - type: dir
        path: .

